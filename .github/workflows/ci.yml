name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres?schema=public
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/postgres?schema=public
        run: pnpm exec prisma generate

      - name: Validate Prisma schema
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres?schema=public
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/postgres?schema=public
        run: pnpm exec prisma validate

      - name: Lint
        run: pnpm run lint

      - name: Build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres?schema=public
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/postgres?schema=public
          RESEND_API_KEY: re_test_placeholder
          RESEND_FROM_EMAIL: noreply@example.com
          MANAGE_TOKEN_SECRET: ci_manage_token_secret_placeholder
          OWNER_SESSION_SECRET: ci_owner_session_secret_placeholder
          CRON_SECRET: ci_cron_secret_placeholder
        run: pnpm run build
